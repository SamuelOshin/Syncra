<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Premium background gradient from Electric Blue to Cyan/Indigo -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e5bf0" />
      <stop offset="100%" stop-color="#0ea5e9" />
    </linearGradient>
    
    <!-- Subtle drop shadow on the inner symbol -->
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- Squircle / Rounded rect app-style base -->
  <rect width="512" height="512" rx="140" fill="url(#bgGrad)" />

  <!-- Centered Aperture Logo with bold strokes for crisp scaling at 16x16 / 32x32 -->
  <g transform="translate(96, 96) scale(13.333)" filter="url(#dropShadow)">
    <circle cx="12" cy="12" r="10" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
    <line x1="14.31" y1="8" x2="20.05" y2="17.94" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
    <line x1="9.69" y1="8" x2="21.17" y2="8" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
    <line x1="7.38" y1="12" x2="13.12" y2="2.06" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
    <line x1="9.69" y1="16" x2="3.95" y2="6.06" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
    <line x1="14.31" y1="16" x2="2.83" y2="16" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
    <line x1="16.62" y1="12" x2="10.88" y2="21.94" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>
